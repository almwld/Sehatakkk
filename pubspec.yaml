name: sehatak
description: A comprehensive healthcare platform for Yemen
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  jitsi_meet: ^8.5.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  
  # Firebase
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.15
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.4.9
  firebase_remote_config: ^4.1.0
  firebase_performance: ^0.9.3+8
  
  # Jitsi Meet for video/voice calls
  jitsi_meet_flutter_sdk: ^0.2.2
  
  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  http: ^1.2.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI
  flutter_svg: ^2.0.9
  iconsax: ^0.0.8
  table_calendar: ^3.0.9
  intl: ^0.18.1
  fl_chart: ^0.66.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  pull_to_refresh: ^2.0.0
  flutter_slidable: ^3.0.1
  confetti: ^0.7.0
  lottie: ^2.7.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  
  # Media
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  url_launcher: ^6.2.3
  share_plus: ^7.2.1
  open_filex: ^4.4.0
  
  # Security & Auth
  local_auth: ^2.1.8
  crypto: ^3.0.3
  encrypt: ^5.0.1
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  
  # Connectivity
  connectivity_plus: ^5.0.2
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Device Info
  device_info_plus: ^9.1.1
  package_info_plus: ^5.0.1
  
  # Background Services
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2
  flutter_background_service_ios: ^5.0.1
  workmanager: ^0.5.2
  
  # WebView
  webview_flutter: ^4.4.0
  
  # Real-time
  socket_io_client: ^2.0.3
  
  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.3.2
  
  # Router
  go_router: ^13.0.1
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Utils
  uuid: ^4.3.3
  logger: ^2.0.2+1
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.1

dev_dependencies:
  jitsi_meet: ^8.5.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.6
  freezed: ^2.4.5
  injectable_generator: ^2.4.1
  go_router_builder: ^2.4.1
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/placeholder.png
    - assets/icons/placeholder.png
    - assets/icons/app_icon.png
    - assets/fonts/
    - assets/animations/
    - assets/json/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
        - asset: assets/fonts/NotoSansArabic-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSansArabic-Medium.ttf
          weight: 500
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik-Regular.ttf
        - asset: assets/fonts/Rubik-Bold.ttf
          weight: 700
        - asset: assets/fonts/Rubik-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rubik-Light.ttf
          weight: 300

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#2E7D32"
  image: "assets/icons/app_icon.png"
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: true
